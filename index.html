<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>盤點小幫手</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0E1116; --panel:#171C24; --line:#262E3A; --ink:#E8EDF4; --dim:#8A95A6;
    --accent:#3DDC97; --accent-ink:#06140E; --warn:#F2B544; --bad:#FF6B6B; --pick:#2A3442;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang TC","Helvetica Neue",Arial,sans-serif;}
  body{height:100dvh; overflow:hidden; display:flex; flex-direction:column;}

  /* ① 品名 5% */
  .name{height:5dvh; padding:0 10px 0 14px; display:flex; align-items:center; gap:8px; overflow:hidden;}
  .nametext{flex:1; min-width:0; display:flex; align-items:baseline; gap:9px; overflow:hidden;}
  .manualbtn{flex:0 0 auto; height:80%; padding:0 11px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:clamp(11px,2vh,13px); font-weight:700; white-space:nowrap;}
  .manualbtn:active{background:var(--pick);}
  .name b{font-size:clamp(15px,3vh,21px); font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .name .sku{font-size:clamp(11px,1.8vh,13px); color:var(--dim); font-variant-numeric:tabular-nums;}
  .name .empty{font-size:clamp(13px,2.4vh,16px); color:var(--dim); font-weight:600;}

  /* ② 相機（正方形，固定在上方） 27% */
  .camwrap{height:27dvh; display:flex; align-items:stretch; justify-content:center; gap:6px; padding:0 6px;}
  #reader{height:27dvh; width:27dvh; flex:0 0 auto; background:#000; overflow:hidden; position:relative;}
  #reader video{width:100%; height:100%; object-fit:cover;}
  .rightcol{flex:1 1 0; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:4px;}
  .itemnav{display:flex; gap:6px; justify-content:center;}
  .navbtn{flex:1; max-width:52px; height:26px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:13px; font-weight:700; line-height:1;
    display:flex; align-items:center; justify-content:center;}
  .navbtn:active{background:var(--pick);}
  .navbtn:disabled{opacity:.3;}
  .reminder{min-width:0; max-height:100%; overflow:hidden;
    display:none; flex-direction:column; justify-content:center; gap:4px;
    padding:8px 10px; border-radius:12px; border:1px solid var(--line);
    background:linear-gradient(180deg,#1B2430,#151B24);}
  .reminder.show{display:flex;}
  .reminder.done{border-color:var(--accent); background:linear-gradient(180deg,#11241B,#0E1B15);}
  .reminder .rtitle{font-size:clamp(11px,1.9vh,13px); color:var(--dim); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .reminder .rbig{font-size:clamp(20px,4.2vh,30px); font-weight:800; line-height:1.05; color:var(--warn);}
  .reminder.done .rbig{color:var(--accent);}
  .reminder .rbig small{font-size:clamp(11px,1.9vh,13px); font-weight:600; color:var(--dim);}
  .reminder .rlist{display:flex; flex-direction:column; gap:2px; margin-top:2px;}
  .reminder .rlist span{font-size:clamp(11px,2vh,14px); font-weight:600; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .reminder .rdone{font-size:clamp(13px,2.4vh,16px); font-weight:800; color:var(--accent);}
  .scanning{position:absolute; left:9px; top:6px; z-index:6; font-size:11px; color:#9be8c8;
    background:rgba(13,17,23,.6); padding:2px 9px; border-radius:999px;}
  .torch{position:absolute; right:9px; top:6px; z-index:7; width:36px; height:36px; border-radius:999px;
    border:1px solid var(--line); background:rgba(13,17,23,.62); color:var(--ink);
    font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  .torch.on{background:var(--warn); color:#1A1206; border-color:var(--warn);}

  /* ③ 位置 / 規格 17% */
  .optszone{height:17dvh; padding:5px 10px 0; display:flex; flex-direction:column; gap:5px; overflow:hidden;}
  .orow{display:flex; flex-direction:column; gap:2px; min-height:0;}
  .label{font-size:10px; color:var(--dim); letter-spacing:1px;}
  .opts{display:flex; gap:6px; overflow-x:auto; overflow-y:hidden; padding-bottom:2px; scrollbar-width:none;}
  .opts::-webkit-scrollbar{display:none;}
  .opt{flex:0 0 auto; padding:7px 13px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:clamp(13px,2.1vh,15px); font-weight:600; white-space:nowrap;}
  .opt.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}

  /* ④ 數字輸入欄 8% */
  .disp{height:8dvh; margin:0 10px; background:#0A0D12; border:1px solid var(--line); border-radius:12px;
    padding:0 14px; font-weight:800; text-align:right; font-variant-numeric:tabular-nums; letter-spacing:1px;
    display:flex; align-items:center; justify-content:flex-end; gap:10px;}
  .disp #dval{font-size:clamp(20px,4.6vh,30px);}
  .disp .hint{font-size:clamp(10px,1.7vh,12px); color:var(--warn); font-weight:600; flex:1; text-align:left;}
  .disp .ph{color:#3B4452;}

  /* ⑤ 數字鍵盤 3×5  40% */
  .padzone{height:40dvh; padding:6px 8px 0; display:grid;
    grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(5,1fr); gap:6px;}
  .key{border-radius:11px; border:1px solid var(--line); background:var(--panel); color:var(--ink);
    font-size:clamp(18px,3.4vh,24px); font-weight:700; font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center;}
  .key:active{background:var(--pick);}
  .key.plus{background:#11241B; border-color:#1E4533; color:var(--accent);}
  .key.minus{background:#241313; border-color:#45211E; color:var(--bad);}
  .key.enter{background:var(--accent); border-color:var(--accent); color:var(--accent-ink); font-size:clamp(16px,3vh,20px); font-weight:800;}
  .key:disabled{opacity:.3;}

  /* ⑥ 底部留空 3% */
  .blank{height:3dvh;}

  .toast{position:fixed; left:50%; top:10px; transform:translateX(-50%);
    max-width:92%; padding:9px 16px; border-radius:12px; font-size:14px; font-weight:600;
    z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.45); opacity:0; transition:opacity .18s; pointer-events:none; white-space:pre-line;}
  .toast.show{opacity:1;}
  .toast.ok{background:var(--accent); color:var(--accent-ink);}
  .toast.err{background:var(--bad); color:#1A0808;}
  .pending{position:fixed; right:10px; bottom:5px; z-index:40; font-size:11px; font-weight:600; color:var(--warn);}
  /* 成功後顯示盤點表現值：畫面中央浮 1 秒、不打斷操作、後蓋前 */
  .curpop{position:fixed; left:50%; top:38%; transform:translate(-50%,-50%) scale(.9);
    z-index:45; padding:14px 22px; border-radius:16px; pointer-events:none;
    background:rgba(13,17,23,.92); border:1px solid var(--accent); color:var(--ink);
    box-shadow:0 10px 30px rgba(0,0,0,.5); text-align:center; opacity:0; transition:opacity .12s, transform .12s;}
  .curpop.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
  .curpop .cpname{font-size:13px; color:var(--dim); margin-bottom:2px; max-width:60vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .curpop .cpval{font-size:30px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1.1;}
  .curpop .cpunit{font-size:13px; color:var(--dim); margin-top:2px;}
  .pending .fail{color:var(--bad); text-decoration:underline; pointer-events:auto;}
  .skumodal{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:60; display:none; align-items:center; justify-content:center; padding:24px;}
  .skubox{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px;}
  .skutitle{font-size:16px; font-weight:800;}
  .skubox input{padding:12px; border-radius:10px; border:1px solid var(--line); background:#0A0D12; color:var(--ink); font-size:18px; text-transform:uppercase; letter-spacing:1px;}
  .skubtns{display:flex; gap:10px;}
  .skubtns button{flex:1; padding:11px; border-radius:10px; border:1px solid var(--line); font-size:15px; font-weight:700;}
  .skucancel{background:var(--panel); color:var(--ink);}
  .skuok{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
</style>
</head>
<body>
  <div class="name">
    <div class="nametext" id="nameBar"><span class="empty">對準條碼開始盤點</span></div>
    <button class="manualbtn" onclick="manualSku()">⌨ SKU</button>
  </div>
  <input id="scanInput" type="text" inputmode="none" autocomplete="off" autocapitalize="characters"
    style="position:fixed; top:-100px; left:-100px; width:1px; height:1px; opacity:0; border:none;"/>

  <div class="camwrap">
    <div id="reader">
      <span class="scanning">● 掃描中 v3</span>
      <button class="torch" id="torchBtn" onclick="toggleTorch()">燈</button>
    </div>
    <div class="rightcol">
      <div class="itemnav" id="itemNav" style="display:none">
        <button class="navbtn" id="navUp" onclick="stepItem(-1)">▲</button>
        <button class="navbtn" id="navDown" onclick="stepItem(1)">▼</button>
      </div>
      <div class="reminder" id="reminder"></div>
    </div>
  </div>

  <div class="optszone">
    <div class="orow" id="posWrap" style="display:none">
      <div class="label">位置</div><div class="opts" id="posRow"></div>
    </div>
    <div class="orow" id="specWrap" style="display:none">
      <div class="label">規格</div><div class="opts" id="specRow"></div>
    </div>
  </div>

  <div class="disp" id="disp"><span class="hint" id="hint"></span><span id="dval"><span class="ph">0</span></span></div>

  <div class="padzone" id="pad"></div>

  <div class="blank"></div>
  <div class="toast" id="toast"></div>
  <div class="pending" id="pending"></div>
  <div class="curpop" id="curpop"></div>

  <div class="skumodal" id="skuModal">
    <div class="skubox">
      <div class="skutitle">手動輸入 SKU</div>
      <input id="skuInput" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" placeholder="例如 JZ001、BP013"/>
      <div class="skubtns">
        <button class="skucancel" onclick="closeSku()">取消</button>
        <button class="skuok" onclick="confirmSku()">確定</button>
      </div>
    </div>
  </div>

const BARCODE_ALIAS = {

function $(id){return document.getElementById(id);}
function todayTab(){const d=new Date(Date.now()-8*3600*1000);
  const m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");

/* ==================== 位置盤點提示（reminder） ====================
 * 品項 reminder（JZ/HB/YG/BP）：即時讀取當天分頁該位置那一欄，空白＝沒盤過。
 *  - 應盤清單：跨區段，凡 positions 含此位置名的品項都算（啟動時自動建反查表）
 *  - 已盤判定 = 「試算表讀到非空白」OR「本次連線自己送出過」（後者是樂觀標記，
 *    避免自己剛送出、佇列還沒真正寫進表格時，畫面又把它當成沒盤）
 *  - 雙格式品項（如 9*9衛生紙@一倉）：必須兩側都有數字才算已盤，缺一側仍算未盤
 *  - ≤5 項列品名，>5 只顯示數字
 *  - 讀取結果快取幾秒，避免同一位置連續掃描時狂打後端
 *  - 讀取失敗（離線等）→ 退回純本地標記，不會整個顯示不出來
 *
 * CA 位置 reminder：維持原本機制（本地記錄＋1小時重設），未改動。
 * =============================================================== */
const LIST_THRESHOLD = 5;          // 未盤 ≤5 項時列出品名
const LIVE_CACHE_MS = 2000;        // 即時讀取快取 2 秒（配合 3 秒自動刷新，避免讀到過舊資料）
const OPTIMISTIC_GRACE_MS = 20000; // 送出後 20 秒寬限期：期間即使盤點表還讀到空白，也維持「已盤」不彈回（等佇列寫完）
const CA_REMIND_RESET = 60*60*1000; // CA 位置 reminder：1 小時重設（維持原機制不變）

// 不納入 reminder 的品項（活動調酒，所有位置都排除）
const REMIND_EXCLUDE = {"JZ010":1,"HB010":1};
// 不納入「品項 reminder」的區段（CA 走另一套「位置 reminder」）
function inItemReminder(sku){
  if(REMIND_EXCLUDE[sku]) return false;
  const it=CFG.items[sku];
  if(!it || it.sec==="CA") return false;   // CA 不走品項 reminder
  return true;
}

// 只有這兩個位置要拆 JZ / HB（因 JZ、HB 的插管/未插同名，需分開計算）；
// 其他位置維持用「位置名」聚合（跨區段）。
const SPLIT_POS = {"吧檯插管":1, "吧檯未插":1};
function remindKey(secName,posName){
  return SPLIT_POS[posName] ? (secName+"::"+posName) : posName;
}

// 反查表：reminder key → 該分組所有「應盤品項」的 sku（已排除活動調酒與 CA）
const POS_ITEMS = (function(){
  const map={};
  for(const sku in CFG.items){
    if(!inItemReminder(sku)) continue;
    const it=CFG.items[sku];
    const positions = it.positions || (CFG.sections[it.sec] && CFG.sections[it.sec].positions) || [];
    positions.forEach(p=>{ const k=remindKey(it.sec,p); (map[k]=map[k]||[]).push(sku); });
  }
  return map;
})();

// CA 位置 reminder：掃到 CA 時，顯示還有哪些「位置」沒盤（跨品項，某位置輸入過任一 CA 品項就算該位置完成）
const CA_POSITIONS = (CFG.sections.CA && CFG.sections.CA.positions) ? CFG.sections.CA.positions.slice() : [];

// 本地樂觀標記：{ "位置key::sku": true }（品項 reminder 的 fallback / OR 條件）
// { "CA位置名": true }（CA 位置 reminder，維持原機制）
// 都跟著營業日；換日自動清空
let doneDay = todayTab();
let doneSet = {};        // 品項 reminder 本地標記
let caDoneSet = {};      // CA 位置 reminder 用（不變）
try{
  const saved=JSON.parse(localStorage.getItem("doneSet")||"{}");
  if(saved.day===todayTab()){ doneSet=saved.map||{}; caDoneSet=saved.ca||{}; }
}catch(e){}
function saveDone(){ localStorage.setItem("doneSet",JSON.stringify({day:doneDay,map:doneSet,ca:caDoneSet})); }
function checkDayRollover(){
  const t=todayTab();
  if(t!==doneDay){ doneDay=t; doneSet={}; caDoneSet={}; saveDone(); remindTimers={}; liveCache={}; }
}
function markDone(posName,sku){
  checkDayRollover();
  const it=CFG.items[sku];
  if(it && it.sec==="CA"){
    caDoneSet[posName]=true;     // CA：記錄「此位置已盤」（跨品項，機制不變）
  }else if(inItemReminder(sku)){
    const k=remindKey(it.sec,posName);
    doneSet[k+"::"+sku]=Date.now();   // 品項 reminder：本地樂觀標記，存送出時間戳（供校驗寬限期判斷）
  }
  saveDone();
}
function caRemaining(){
  const rem=CA_POSITIONS.filter(p=>!caDoneSet[p]);
  return {total:CA_POSITIONS.length, remain:rem};
}

// CA 用：1 小時重設（機制不變，只保留給 CA）
let remindTimers={};
let remindTick=null;
function checkPosReset(key){
  const t=remindTimers[key];
  if(t!=null && (Date.now()-t)>CA_REMIND_RESET){
    caDoneSet={}; saveDone();
    delete remindTimers[key];
    return true;
  }
  return false;
}

// ---- 即時讀取（品項 reminder 專用）----
let liveCache={};   // { key: {ts, data:{total,remain[]}} }

// 判斷某品項在某位置的儲存格值是否算「已盤」
//  一般品項：非空白即算已盤
//  雙格式品項（該品項在此位置有 dualSpec）：必須兩側都是數字才算已盤，缺一側仍算未盤
function isFilledValue(sku,posName,raw){
  const it=CFG.items[sku];
  if(it.dualSpec && it.dualSpec[posName]){
    const slots=it.dualSpec[posName].slots;
    const parts=String(raw==null?"":raw).split("/");
    if(parts.length<slots.length) return false;
    for(let i=0;i<slots.length;i++){
      const c=(parts[i]==null?"":String(parts[i]).trim());
      if(c===""||c.toLowerCase()==="n"||isNaN(Number(c))) return false;
    }
    return true;
  }
  return !(raw===""||raw==null);
}
function groupByBlock(skus){
  const byBlock={};
  skus.forEach(sku=>{
    const it=CFG.items[sku];
    const block=CFG.sections[it.sec].block;
    (byBlock[block]=byBlock[block]||[]).push(sku);
  });
  return byBlock;
}

// 向後端要「這個位置這些品項現在的儲存格值」，回傳 {total, remain:[sku...]}
// 已盤 = 試算表非空白（雙格式需兩側皆有數字） OR 本地樂觀標記
async function fetchLiveRemain(secName,posName){
  const k=remindKey(secName,posName);
  const skus=POS_ITEMS[k]||[];
  if(skus.length===0) return {total:0,remain:[]};

  const cached=liveCache[k];
  if(cached && (Date.now()-cached.ts)<LIVE_CACHE_MS) return cached.data;

  const byBlock=groupByBlock(skus);
  const reqs=Object.keys(byBlock).map(block=>{
    const list=byBlock[block];
    const namesParam=encodeURIComponent(list.map(sku=>CFG.items[sku].name).join("|"));
    const url=SCRIPT_URL+"?remind=1&block="+encodeURIComponent(block)+"&col="+encodeURIComponent(posName)+"&names="+namesParam;
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),8000);
    return fetch(url,{signal:ctrl.signal}).then(r=>r.text())
      .then(txt=>{ clearTimeout(t); try{return JSON.parse(txt);}catch(e){return {success:false};} })
      .then(res=>({list,res}))
      .catch(()=>{ clearTimeout(t); return {list,res:{success:false}}; });
  });

  const results=await Promise.all(reqs);
  const now=Date.now();
  const remain=[];
  let anyOk=false, anyFail=false;
  results.forEach(({list,res})=>{
    if(res && res.success) anyOk=true; else anyFail=true;
    list.forEach(sku=>{
      const dkey=k+"::"+sku;
      const justSent = doneSet[dkey] && (now-doneSet[dkey])<OPTIMISTIC_GRACE_MS;  // 剛送出、還在寬限期
      if(res && res.success){
        // 成功讀到盤點表 → 以盤點表為準
        const it=CFG.items[sku];
        const raw = res.values ? res.values[it.name] : "";
        const liveFilled = isFilledValue(sku,posName,raw);
        if(liveFilled){
          delete doneSet[dkey];          // 盤點表已有值 → 清掉本地樂觀標記，之後以表為準
        }else if(justSent){
          // 盤點表還空白，但剛送出仍在寬限期（佇列可能還沒寫完）→ 暫時維持已盤，不彈回
        }else{
          remain.push(sku);              // 盤點表空白且非剛送出 → 確定未盤
          delete doneSet[dkey];
        }
      }else{
        // 讀取失敗（離線等）→ 退回本地樂觀標記，不因讀不到就把剛盤的彈回來
        if(!doneSet[dkey]) remain.push(sku);
      }
    });
  });
  saveDone();

  const data={total:skus.length, remain, allFailed:(anyFail && !anyOk)};
  // 全部讀取失敗時不更新快取（保留上次成功的資料），成功才更新
  if(anyOk) liveCache[k]={ts:Date.now(), data};
  return data;
}

let reminderToken=0;

function updateReminder(fromAction){
  checkDayRollover();
  const el=$("reminder");
  const myToken=++reminderToken;

  // CA 走位置 reminder（機制不變：本地記錄 + 1 小時重設）
  if(cur && sec==="CA"){
    checkPosReset("__CA__");
    if(remindTimers["__CA__"]==null) remindTimers["__CA__"]=Date.now();
    const {total,remain}=caRemaining();
    if(remain.length===0){
      el.className="reminder show done";
      el.innerHTML='<div class="rtitle">易開罐 各位置</div><div class="rdone">✓ 全部位置已盤</div>';
      clearTimeout(el._hideT); el._hideT=setTimeout(hideReminder,4000);
      return;
    }
    let html='<div class="rtitle">易開罐 未盤位置</div>';
    html+='<div class="rbig">'+remain.length+' <small>個位置 / 共'+total+'</small></div>';
    html+='<div class="rlist">'+remain.map(p=>'<span>· '+esc(p)+'</span>').join('')+'</div>';
    el.className="reminder show";
    el.innerHTML=html;
    clearTimeout(el._hideT);
    return;
  }

  // 其他區段走品項 reminder（即時讀取）
  if(!pos || !cur){ hideReminder(); return; }
  const k=remindKey(sec,pos);
  if(!POS_ITEMS[k] || POS_ITEMS[k].length===0){ hideReminder(); return; }

  // 立即用快取或本地標記先顯示，避免等待期間畫面空白
  const immediate = liveCache[k] ? liveCache[k].data : (function(){
    const all=POS_ITEMS[k];
    const rem=all.filter(sku=>!doneSet[k+"::"+sku]);
    return {total:all.length, remain:rem};
  })();
  renderReminderCard(pos, immediate.total, immediate.remain);

  // 背景抓即時資料，抓到後（且使用者仍在同一位置，token 沒過期）才刷新畫面
  fetchLiveRemain(sec,pos).then(data=>{
    if(myToken!==reminderToken) return;   // 使用者已切走，這次結果作廢
    if(data.allFailed) return;            // 讀取全失敗：保留立即顯示的內容，不刷成殘缺資料
    renderReminderCard(pos, data.total, data.remain);
  }).catch(()=>{});
}

function renderReminderCard(title,total,remain){
  const el=$("reminder");
  if(remain.length===0){
    el.className="reminder show done";
    el.innerHTML='<div class="rtitle">'+esc(title)+'</div><div class="rdone">✓ 此位置已盤完</div>';
    clearTimeout(el._hideT); el._hideT=setTimeout(hideReminder,4000);
    return;
  }
  let html='<div class="rtitle">'+esc(title)+'</div>';
  html+='<div class="rbig">'+remain.length+' <small>項未盤 / 共'+total+'</small></div>';
  if(remain.length<=LIST_THRESHOLD){
    html+='<div class="rlist">'+remain.map(sku=>'<span>· '+esc(CFG.items[sku].name)+'</span>').join('')+'</div>';
  }
  el.className="reminder show";
  el.innerHTML=html;
  clearTimeout(el._hideT);
}
function hideReminder(){ const el=$("reminder"); el.className="reminder"; el.innerHTML=""; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ---------- 相機：超廣角優先(iPhone) + 正方形讀取 + 持續掃描 ----------
function startScan(){
  const c={ verbose:false, experimentalFeatures:{ useBarCodeDetectorIfSupported:true } };
  if(typeof Html5QrcodeSupportedFormats!=="undefined") c.formatsToSupport=[Html5QrcodeSupportedFormats.QR_CODE]; // 只解 QR
  scanner=new Html5Qrcode("reader",c);
  const qrbox=(vw,vh)=>{ const s=Math.floor(Math.min(vw,vh)*0.92); return {width:s,height:s}; }; // 正方形

  Html5Qrcode.getCameras().then(devices=>{
    let targetCamera={ facingMode:"environment" };          // 預設後鏡頭
    const isIPhone=/iPhone/i.test(navigator.userAgent);
    if(isIPhone && devices && devices.length>0){
      const uw=devices.find(d=> d.label &&
        (d.label.toLowerCase().includes("ultra wide") || d.label.toLowerCase().includes("ultrawide")));
      if(uw) targetCamera=uw.id;                            // 超廣角（近距離對焦最符合實際使用）
    }
    return scanner.start(
      targetCamera,
      { fps:15, qrbox:qrbox, disableFlip:true },            // disableFlip：不再試鏡像版本，解碼約快一倍
      onScan, ()=>{}
    );
  }).then(()=>{ keepCameraAlive(); })
    .catch(e=>toast("相機啟動失敗，請確認已允許相機權限：\n"+e,"err"));
}
// 看門狗：相機若被任何原因暫停（含手動輸入、切到背景），自動恢復
let camWatch=null;
function keepCameraAlive(){
  if(camWatch) clearInterval(camWatch);
  camWatch=setInterval(()=>{ const v=document.querySelector("#reader video"); if(v && v.paused){ v.play().catch(()=>{}); } },1500);
}
document.addEventListener("visibilitychange",()=>{

let lastUnknown="";
let torchOn=false;

// ---------- 藍牙掃碼槍（HID 鍵盤模擬）支援：永遠開啟 ----------
// 焦點永遠保持在隱藏輸入框，可連續掃描；若手指點了別的按鈕（切位置等）導致焦點移開，
//   會在「放開手指的瞬間」（pointerup/touchend，而非按下時）把焦點還回來——放開時的 focus
//   比較不會被 iOS 當成「要打字」而跳鍵盤。
// 焦點安全網：放開手指那一瞬間的 pointerup/touchend 偶爾接不住（例如送出後一連串非同步處理
//   影響時機），所以額外每 1.5 秒定期補檢查一次，避免焦點跑掉後就再也拉不回來、掃碼槍失效。
function refocusScan(){
  if($("skuModal").style.display==="flex") return;   // 手動 SKU 視窗開著時不搶
  const si=$("scanInput");
  if(document.activeElement!==si) si.focus();
}
$("scanInput").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  const code=$("scanInput").value.trim().toUpperCase();
  $("scanInput").value="";

});
document.addEventListener("pointerup",()=>{ setTimeout(refocusScan,0); });
document.addEventListener("touchend",()=>{ setTimeout(refocusScan,0); });

// 喚醒解鎖：App 從背景關掉再打開（掃碼槍藍牙仍連著）時，頁面沒有重新載入，也還沒發生過
//   任何真正的使用者點擊，iOS 會擋掉這之前所有「非使用者手勢觸發」的 .focus() 呼叫（開場那次、
//   以及上面的定期安全網都會被靜默忽略）。這裡監聽「重新整理/回到前景後的第一次觸碰」，
//   同步（不經 setTimeout）立刻 focus，盡量搶在 iOS 判定手勢有效的窗口內，讓使用者點畫面
//   任何地方一下（不必特地找按鈕）就能恢復掃碼槍輸入。
function wakeUnlockFocus(){ $("scanInput").focus(); }
document.addEventListener("touchstart",wakeUnlockFocus,{once:true});
document.addEventListener("pointerdown",wakeUnlockFocus,{once:true});
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    document.addEventListener("touchstart",wakeUnlockFocus,{once:true});
    document.addEventListener("pointerdown",wakeUnlockFocus,{once:true});
  }
});

// ---------- 掃碼：支援「SKU＋兩碼位置後綴」自動帶入位置 ----------
// 條碼格式：兩碼英文＋三碼數字（＋可選兩碼位置後綴），例如 JZ001、HB003DF、BP012SA
let lastApplied="";   // 已套用過的完整條碼，避免持續掃描重複觸發
function parseCode(code){
  if(BARCODE_ALIAS[code]) return {base:BARCODE_ALIAS[code], suf:null};
  const m=code.match(/^([A-Z]{2}\d{3})([A-Z0-9]{2})?$/);
  return m ? {base:m[1], suf:m[2]||null} : {base:code, suf:null};
}
function applyCode(code,manual){
  const {base,suf}=parseCode(code);
  const item=CFG.items[base];
  if(!item) return false;
  lastUnknown=""; lastApplied=code;
  if(!(cur && cur.sku===base)) loadItem(base,item);
  if(suf){
    const posName=(SUFFIX_POS[item.sec]||{})[suf];
    const positions=item.positions||CFG.sections[item.sec].positions;
    if(posName && positions.includes(posName)){
      if(pos!==posName) selectPos(posName);
    }else{
      toast("後綴「"+suf+"」沒有對應位置，請手動選擇","err");
    }
  }else if(item.sec==="CA"){
    // 易開罐無後綴：強制預設儲冰槽（不受上次選擇影響）
    const dp=CFG.sections.CA.defaultPos;
    if(pos!==dp) selectPos(dp);
  }
  return true;
}
function onScan(text){
  const code=text.trim().toUpperCase();
  if(code===lastApplied) return;                       // 同一張標籤持續入鏡：不重複處理
  if(!applyCode(code,false)){
    if(code!==lastUnknown){ lastUnknown=code; toast("讀到條碼，但查無此 SKU：\n"+code,"err"); }
  }
}

function loadItem(sku,item){
  cur={sku,...item}; sec=item.sec; disp="";
  $("nameBar").innerHTML='<b>'+item.name+'</b><span class="sku">'+sku+'</span>';
  const positions = item.positions || CFG.sections[sec].positions;
  const row=$("posRow"); row.innerHTML="";
  positions.forEach(p=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=p;
    b.onclick=()=>{ lastApplied=""; selectPos(p); };   // 手動改位置後，重掃同一張標籤仍可再套用
    row.appendChild(b);
  });
  $("posWrap").style.display="flex";
  const secDef=CFG.sections[sec].defaultPos;   // 區段預設位置（CA=儲冰槽）
  const def=(lastPos[sec] && positions.includes(lastPos[sec])) ? lastPos[sec]
            : (secDef && positions.includes(secDef)) ? secDef
            : positions[0];
  selectPos(def); setDisp("");
  updateItemNav();   // 更新品項切換上下鍵（只有 JZ/HB/YG 顯示）
}

// 品項切換上下鍵：只在 JZ/HB/YG 品項顯示，切換同區段 001~010
const NAV_SECTIONS = {"JZ":1,"HB":1,"YG":1};
function updateItemNav(){
  const nav=$("itemNav");
  if(!cur || !NAV_SECTIONS[sec]){ nav.style.display="none"; return; }
  nav.style.display="flex";
  const n=parseInt(cur.sku.slice(2),10);
  $("navUp").disabled = !(n>1 && CFG.items[sec+String(n-1).padStart(3,"0")]);      // 已在最小編號→停住
  $("navDown").disabled = !CFG.items[sec+String(n+1).padStart(3,"0")];             // 已在最大編號→停住
}
// dir: -1=上一個(編號-1), +1=下一個(編號+1)
function stepItem(dir){
  if(!cur || !NAV_SECTIONS[sec]) return;
  const n=parseInt(cur.sku.slice(2),10);
  const nextSku=sec+String(n+dir).padStart(3,"0");
  const nextItem=CFG.items[nextSku];
  if(!nextItem) return;   // 邊界：沒有下一個就停住，不循環
  const keepPos=pos;      // 記住目前位置，切換後盡量沿用
  lastApplied="";         // 允許之後重掃同標籤
  loadItem(nextSku,nextItem);
  // 切換後：若原位置在新品項也支援，就沿用；否則 loadItem 已退回新品項第一個位置
  const positions=nextItem.positions||CFG.sections[sec].positions;
  if(keepPos && positions.includes(keepPos) && pos!==keepPos) selectPos(keepPos);
}
function selectPos(p){
  pos=p; lastPos[sec]=p; localStorage.setItem("lastPos",JSON.stringify(lastPos));
  [...$("posRow").children].forEach(b=>b.classList.toggle("on",b.textContent===p));
  buildSpecs();
  updateReminder(true);   // 切換位置立即更新提示（跟著新位置的剩餘，能解除靜默）
}

function buildSpecs(){
  const S=CFG.sections[sec]; let specs=[];
  dualCfg=null; dualSlot=null;
  // 雙格式（大/小、假清/烘焙）：在特定位置把規格選單當成「兩側切換」用
  if(sec==="BP" && cur.dualSpec && cur.dualSpec[pos]){
    dualCfg=cur.dualSpec[pos];
    specs=dualCfg.slots.slice();
  }
  else if(sec==="CA"){
    // 易開罐：一律箱/瓶換算；boxOnly 位置（一倉）只顯示箱
    specs=(S.boxOnly && S.boxOnly.includes(pos)) ? ["箱"] : S.canSpec.map(s=>s[0]);
  }
  else if(sec==="JZ"||sec==="HB"){ if(pos===S.tap) specs=["10L","15L","橡膠","整桶"]; }
  else if(sec==="BP"){
    // 位置限定規格：該品項在此位置若有 posSpec 就用它，否則用預設 spec
    const useSpec=(cur.posSpec && cur.posSpec[pos]) ? cur.posSpec[pos] : cur.spec;
    if(useSpec) specs=useSpec.map(s=>s[0]);
  }
  const row=$("specRow");
  if(specs.length===0){ $("specWrap").style.display="none"; spec=null; applyMode(); return; }
  row.innerHTML="";
  specs.forEach(s=>{const b=document.createElement("button"); b.className="opt"; b.textContent=s;
    b.onclick=()=>selectSpec(s); row.appendChild(b);});
  $("specWrap").style.display="flex";
  let def;
  if(sec==="CA"){
    // 易開罐：一倉只有箱；其他位置預設「瓶」（不受上次選擇影響）
    def=specs.includes("瓶")?"瓶":specs[0];
  }else{
    def=(lastSpec[sec] && specs.includes(lastSpec[sec]))?lastSpec[sec]:specs[0];
  }
  selectSpec(def);
}
function selectSpec(s){
  spec=s; lastSpec[sec]=s; localStorage.setItem("lastSpec",JSON.stringify(lastSpec));
  [...$("specRow").children].forEach(b=>b.classList.toggle("on",b.textContent===s));
  applyMode();
}

function applyMode(){
  const S=CFG.sections[sec];
  weigh=false; mult=1; writeCol=pos;
  if(dualCfg){                                   // 雙格式：spec 當作「側別」，倍數由 dualCfg.mult 決定
    dualSlot=spec;
    mult=dualCfg.mult||1;
  }
  else if((sec==="JZ"||sec==="HB") && pos===S.tap && (spec==="10L"||spec==="15L"||spec==="橡膠")){ weigh=true; writeCol=pos; }
  else if(sec==="YG" && pos===S.tap && !cur.countOnly){ weigh=true; writeCol=S.weighCol; }
  else if(sec==="CA"){ const f=S.canSpec.find(x=>x[0]===spec); mult=f?f[1]:1; writeCol=pos; }
  else if(sec==="BP"){
    const useSpec=(cur.posSpec && cur.posSpec[pos]) ? cur.posSpec[pos] : cur.spec;
    if(useSpec){ const f=useSpec.find(x=>x[0]===spec); mult=f?f[1]:1; }
  }
  updateHint();
  const beerWeigh=(sec==="YG" && weigh);
  document.querySelectorAll(".key.plus,.key.minus").forEach(b=>b.disabled=beerWeigh);
}
function updateHint(){
  const h=$("hint"); const w=parseFloat(disp);
  if(weigh && !isNaN(w)){
    let v;
    if(sec==="YG") v=(w-F.beer.empty)/F.beer.cap;
    else{const k=F[spec]; v=(w-k.empty)/k.cap;}
    h.textContent="換算："+v.toFixed(2)+" 桶";
  } else if(dualCfg){
    const other=dualCfg.slots.find(s=>s!==dualSlot);
    let msg="填「"+dualSlot+"」欄（另一側「"+other+"」不動）";
    if(mult>1 && !isNaN(w)) msg="1 箱 = "+mult+" 個｜填「"+dualSlot+"」";
    h.textContent=msg;
  } else if(sec==="CA" && spec==="箱"){
    h.textContent="1 箱 = 24 瓶";
  } else if(sec==="BP" && cur && mult>1){
    h.textContent="1 "+spec+" = "+mult+" 個";
  } else h.textContent="";
}

// 3×5：1-9 . 0 ⌫ ＋ 最後一列 +1 -1 輸入
const KEYS=["1","2","3","4","5","6","7","8","9",".","0","⌫","-","-1","輸入"];
function renderPad(){
  const pad=$("pad"); pad.innerHTML="";
  KEYS.forEach(k=>{
    const b=document.createElement("button"); b.textContent=k; b.className="key";
    if(k==="-1"){b.className+=" minus"; b.onclick=()=>submit("add",-mult);}
    else if(k==="輸入"){b.className+=" enter"; b.onclick=()=>press("輸入");}
    else b.onclick=()=>press(k);
    pad.appendChild(b);
  });
}
function press(k){
  if(k==="⌫"){ disp=disp.slice(0,-1); setDisp(disp); updateHint(); return; }
  if(k==="."){ if(!disp.includes("."))disp=(disp||"0")+"."; setDisp(disp); return; }
  if(k==="-"){                                    // 負號切換：再按一次取消，讓使用者能手動輸入任意負值
    disp = disp.startsWith("-") ? disp.slice(1) : ("-"+disp);
    setDisp(disp); updateHint(); return;
  }
  if(/[0-9]/.test(k)){ if(disp==="0")disp=""; disp+=k; setDisp(disp); updateHint(); return; }
  if(k==="輸入"){
    const n=parseFloat(disp);
    if(isNaN(n)){ toast("請先輸入數字","err"); return; }
    if(weigh){
      if(sec==="YG"){ submit("set",n); return; }
      const kk=F[spec]; submit("set",Math.round(((n-kk.empty)/kk.cap)*100)/100);
    } else submit("add",n*mult);
  }
}
function setDisp(v){ disp=v; $("dval").innerHTML = v===""? '<span class="ph">0</span>' : v; }

/* ---------- 送出與佇列（穩定性強化版） ----------
 * 1. 佇列持久化到 localStorage：中途關頁面/鎖屏，重開後自動續傳，不遺失
 * 2. 網路錯誤不丟棄：留在佇列，指數退避自動重試（1.5s→3s→6s…最長30s）
 * 3. 後端邏輯錯誤（找不到品項/欄位）：不會自動好，移入「失敗清單」供查看
 * 4. 每筆帶唯一 uid，後端去重：重試不會造成 +1 重複累加
 * 5. 右下角狀態：● 待傳 N ／ ⟳ 重試中 ／ ✗ 失敗 N（點擊可查看與清除）
 */
let sendQueue=[], failedList=[];
try{ sendQueue=JSON.parse(localStorage.getItem("sendQueue")||"[]"); }catch(e){ sendQueue=[]; }
try{ failedList=JSON.parse(localStorage.getItem("failedList")||"[]"); }catch(e){ failedList=[]; }
let flushing=false, retryCount=0, retryTimer=null;
const MAX_RETRY=6;   // 同一筆重試上限：超過就移到失敗清單、放行後續（避免一筆卡死整個佇列）
function saveQ(){
  localStorage.setItem("sendQueue",JSON.stringify(sendQueue));
  localStorage.setItem("failedList",JSON.stringify(failedList));
}
function newUid(){ return Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8); }

function submit(op,value){
  if(!cur||!pos){ toast("請先掃描品項並選位置","err"); return; }
  const shown=op==="set"?Number(value).toFixed(2):(value>0?"+":"")+value;
  const unit=(sec==="CA")?"瓶（目前）":(weigh?"桶（目前）":"個（目前）");
  const payload={uid:newUid(),sku:cur.sku,name:cur.name,block:CFG.sections[sec].block,
    header:CFG.sections[sec].header,writeCol,op,value,spec:spec||"",date:todayTab(),
    target:CFG.sections[sec].target||"day",   // 送哪支後端：CA→can（易開罐），其餘→day（日盤表）
    wpos:pos, wunit:unit,                      // 跳窗用：位置、現值單位
    label:cur.name+"｜"+pos+(spec?"｜"+spec:"")+"｜"+shown};
  if(dualCfg){                                   // 雙格式：告訴後端要填哪一側、共有哪兩側
    payload.dual=dualSlot;
    payload.dualSlots=dualCfg.slots;
    payload.op="add";                            // 雙格式一律累加（缺的一側補 n）
  }
  sendQueue.push(payload); saveQ(); updatePending(); processQueue();
  toast("✓ "+payload.label,"ok");  // 立刻回饋；若之後傳送失敗會自動重試並在右下角顯示
  setDisp("");
  optimisticDone(pos,cur.sku);   // 送出瞬間：立即樂觀標記並 -1（不等讀取）
}

// 送出瞬間的樂觀處理：把剛送出這一項從「上次已知的未盤清單」移除，立即 -1（不全量重算，避免閃動）
// 雙格式（空桶大/小、9*9衛生紙假清/烘焙）：要兩側都送過才算盤完，只送一側不 -1
function optimisticDone(posName,sku){
  const it=CFG.items[sku];
  let counted=true;   // 這次送出是否算「該品項已盤」（雙格式只送一側時 false）
  if(it && it.sec!=="CA" && it.dualSpec && it.dualSpec[posName]){
    const dk="dualSent::"+remindKey(it.sec,posName)+"::"+sku;
    let sent=[]; try{ sent=JSON.parse(localStorage.getItem(dk)||"[]"); }catch(e){}
    if(dualSlot && sent.indexOf(dualSlot)===-1) sent.push(dualSlot);
    localStorage.setItem(dk,JSON.stringify(sent));
    const need=(it.dualSpec[posName].slots||[]).length;
    if(sent.length>=need){ markDone(posName,sku); } else { counted=false; }
  }else{
    markDone(posName,sku);
  }

  const k=remindKey(sec,posName);
  // 關鍵：不清空快取、不全量重算。直接從「上次已知的未盤清單」移除剛送的這一項，
  // 這樣立即顯示只會正確地 -1（例如 5→4），不會因為退回純本地計算而短暫暴增。
  if(counted && liveCache[k] && liveCache[k].data){
    const d=liveCache[k].data;
    const nr=d.remain.filter(s=>s!==sku);
    liveCache[k]={ts:0, data:{total:d.total, remain:nr}};  // ts=0：標記為「需背景校驗」，但保留當前清單顯示
  }
  updateReminder(true);
}
function processQueue(){
  if(flushing || sendQueue.length===0) return;
  flushing=true;
  clearTimeout(retryTimer);
  const payload=sendQueue[0];
  const url=(payload.target==="can")?CAN_SCRIPT_URL:SCRIPT_URL;   // CA 送易開罐後端，其餘送日盤表後端

  // 若這筆先前送過(重試中)，先問後端「這個 uid 寫了沒」，避免重送造成 +1 變 +2
  const preflight = payload._sent
    ? checkUid(url,payload.uid)
    : Promise.resolve(null);

  preflight.then(chk=>{
    if(chk && chk.status==="done"){
      // 後端確認已寫入 → 直接當成功，拿現值，絕不重送
      onWriteSuccess(payload,{success:true,written:chk.written,name:chk.name});
      return null;
    }
    // unknown / processing / 查詢失敗 → 正常送出（processing 交給後端去重擋掉）
    return sendOnce(url,payload);
  }).catch(()=>{
    // preflight 或送出流程的網路錯誤 → 退避重試
    scheduleRetry();
  });
}

// 送出一筆（帶 45 秒逾時）
function sendOnce(url,payload){
  payload._sent=true;   // 標記「送過了」，之後重試會先查 uid
  const ctrl=new AbortController();
  const timeoutId=setTimeout(()=>ctrl.abort(),45000);   // 45 秒（Apps Script 冷啟動有時很慢，太短會誤判逾時而重試）
  return fetch(url,{method:"POST",body:JSON.stringify(payload),signal:ctrl.signal})
    .then(async r=>{ const txt=await r.text();
      try{ return JSON.parse(txt); }
      catch(e){ throw new Error("回應非 JSON（權限或未部署）"); } })
    .then(res=>{ clearTimeout(timeoutId); onWriteSuccess(payload,res); })
    .catch(e=>{ clearTimeout(timeoutId); scheduleRetry(); });
}

// 查詢 uid 狀態（GET，帶 15 秒逾時）；失敗回 null（當作查不到，走正常重送）
function checkUid(url,uid){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),15000);
  return fetch(url+"?checkUid="+encodeURIComponent(uid),{method:"GET",signal:ctrl.signal})
    .then(r=>r.text()).then(txt=>{ clearTimeout(t); try{return JSON.parse(txt);}catch(e){return null;} })
    .catch(()=>{ clearTimeout(t); return null; });
}

// 寫入成功（含後端去重回覆）的統一處理
function onWriteSuccess(payload,res){
  sendQueue.shift(); retryCount=0;
  if(!res.success){                                  // 後端明確拒絕：重試也不會好 → 進失敗清單
    failedList.push({label:payload.label,err:res.error||"寫入失敗"});
    toast("✗ "+payload.name+"："+(res.error||"寫入失敗"),"err");
  }else if(res.written!==undefined && res.written!==null){
    showCurrent(payload,res.written);                // 跳窗顯示盤點表現值（1 秒、後蓋前）
  }
  saveQ(); flushing=false; updatePending(); processQueue();
}

function scheduleRetry(){
  flushing=false; retryCount++;
  updatePending(true);
  if(retryCount>=MAX_RETRY){
    // 重試已達上限：先最後查一次 uid，萬一其實已寫入（只是回應一直收不到）就當成功，
    // 否則移到失敗清單、放行後續品項，不讓這一筆卡死整個佇列
    const payload=sendQueue[0];
    if(!payload){ return; }
    const url=(payload.target==="can")?CAN_SCRIPT_URL:SCRIPT_URL;
    checkUid(url,payload.uid).then(chk=>{
      if(chk && chk.status==="done"){
        onWriteSuccess(payload,{success:true,written:chk.written,name:chk.name});
      }else{
        sendQueue.shift(); retryCount=0;
        failedList.push({label:payload.label,err:"多次重試失敗（可能離線或後端無回應），請手動補登"});
        toast("✗ "+payload.name+"：多次重試失敗，已移至失敗清單","err");
        saveQ(); flushing=false; updatePending(); processQueue();
      }
    }).catch(()=>{
      // 連最後查詢都失敗 → 移到失敗清單、放行後續
      sendQueue.shift(); retryCount=0;
      failedList.push({label:payload.label,err:"多次重試失敗（可能離線或後端無回應），請手動補登"});
      toast("✗ "+payload.name+"：多次重試失敗，已移至失敗清單","err");
      saveQ(); flushing=false; updatePending(); processQueue();
    });
    return;
  }
  const delay=Math.min(30000, 1500*Math.pow(2,Math.min(retryCount,5)));
  retryTimer=setTimeout(processQueue,delay);
}

// 成功後跳窗顯示盤點表現值：畫面中央浮 1 秒、後蓋前、不打斷操作
let curPopT=null;
function showCurrent(payload,written){
  const el=$("curpop");
  const title=(payload.name||"")+(payload.wpos?"｜"+payload.wpos:"");
  el.innerHTML='<div class="cpname">'+esc(title)+'</div>'+
               '<div class="cpval">'+esc(String(written))+'</div>'+
               '<div class="cpunit">'+esc(payload.wunit||"目前數量")+'</div>';
  el.className="curpop show";
  clearTimeout(curPopT);                      // 後蓋前：連續送出只留最新一筆
  curPopT=setTimeout(()=>{ el.className="curpop"; },1000);   // 1 秒後淡出
}
function updatePending(retrying){
  const el=$("pending"); let parts=[];
  if(sendQueue.length) parts.push((retrying?"⟳ 重試中 ":"● 待傳 ")+sendQueue.length);
  if(failedList.length) parts.push('<span class="fail" onclick="showFailed()">✗ 失敗 '+failedList.length+'</span>');
  el.innerHTML=parts.join("　");
}
function showFailed(){
  const msg=failedList.map((f,i)=>(i+1)+". "+f.label+"\n　→ "+f.err).join("\n");
  if(confirm("以下項目寫入失敗（需手動補登到日盤表）：\n\n"+msg+"\n\n按「確定」清除此清單，「取消」保留。")){
    failedList=[]; saveQ(); updatePending();
  }
}

let tTimer=null;
function toast(msg,type){ const t=$("toast"); t.textContent=msg; t.className="toast "+type+" show";
  clearTimeout(tTimer); tTimer=setTimeout(()=>t.className="toast "+type,2600); }

renderPad();
$("skuInput").addEventListener("keydown",e=>{ if(e.key==="Enter") confirmSku(); });
updatePending();
processQueue();   // 開頁時若上次還有沒傳完的，先續傳
// 每 20 秒檢查一次：讓 reminder 的 10 分鐘逾時即使使用者沒動作也能自動消失
// 每 3 秒自動刷新 reminder（反映隊友在另一支手機的盤點）；只在卡片顯示時跑，讀取失敗保留原畫面
remindTick=setInterval(()=>{
  if(!$("reminder").classList.contains("show")) return;
  if(!cur) return;
  if(sec==="CA"){ updateReminder(); return; }        // CA 走本地機制，直接更新
  const k=remindKey(sec,pos);
  if(!POS_ITEMS[k] || POS_ITEMS[k].length===0) return;
  const myToken=++reminderToken;
  fetchLiveRemain(sec,pos).then(data=>{
    if(myToken!==reminderToken) return;              // 已切走則作廢
    if(data.allFailed) return;                       // 讀取全失敗：保留原畫面，不跳動
    renderReminderCard(pos, data.total, data.remain);
  }).catch(()=>{});                                   // 例外：什麼都不做，保留原畫面
},3000);
$("scanInput").focus();
setInterval(refocusScan,1500);
startScan();
</script>
